# InsureVoice — Agent Builder Tool Definitions
#
# This file registers the three Sub-Agent tools used by the Root Agent (Insurance Sales Supervisor).
#
# Tool ownership:
#   elastic_product_search  — Elastic MCP server (ELSER v2 hybrid search on insurance_products_current)
#                             Primary search integration as required by hackathon judging criteria.
#                             Env var: none — the MCP server manages its own connection.
#
#   compliance_check        — Cloud Function (functions/compliance_check/main.py)
#                             Deterministic eligibility rule engine. Zero LLM involvement (Constitution §II).
#                             Env var: COMPLIANCE_CHECK_URL
#
#   rank_products           — Cloud Function (functions/rank_products/main.py)
#                             Suitability scoring + top-3 ranking with full audit trail.
#                             Env var: RANK_PRODUCTS_URL
#
# OpenAPI 3.0.3 — validated with openapi-spec-validator (TASK-050)
openapi: "3.0.3"
info:
  title: InsureVoice Cloud Function Tools
  version: "1.0"
  description: OpenAPI specs for Agent Builder tool registration

paths:

  # ---------------------------------------------------------------------------
  # Tool 1: Elastic MCP — ELSER v2 Hybrid Search (TASK-041)
  # ---------------------------------------------------------------------------
  /elastic_product_search:
    post:
      operationId: elastic_product_search
      summary: Search the insurance product catalog using ELSER v2 hybrid search via Elastic MCP
      description: >
        Performs RRF hybrid search (semantic + BM25) over the insurance_products_current
        Elasticsearch alias. Hard eligibility filters (age, income, smoker) are applied
        at search time as a pre-compliance optimisation. Returns up to 10 candidate products
        with raw ELSER relevance scores for downstream compliance and ranking.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query, customer_age, is_smoker, income]
              properties:
                query:
                  type: string
                  description: >
                    Natural-language customer intent, e.g.
                    "affordable term plan for a 35-year-old non-smoker with family"
                customer_age:
                  type: integer
                  minimum: 18
                  maximum: 75
                  description: Customer age in years; used for eligibility pre-filter
                is_smoker:
                  type: boolean
                  description: >
                    If true, filters out products where smoker_eligible=false
                income:
                  type: integer
                  minimum: 0
                  description: Annual income in INR; filters products by min_income
                product_type:
                  type: string
                  description: >
                    Optional product type filter (e.g. "term_life", "health", "ulip",
                    "endowment", "critical_illness", "pension", "child_plan")
                size:
                  type: integer
                  minimum: 1
                  maximum: 20
                  default: 10
                  description: Maximum number of candidate products to return
                relax_age_filter:
                  type: boolean
                  default: false
                  description: >
                    When true, skips age bounds filter as a fallback when the strict
                    query returns no results. Agent Builder should set this after a
                    zero-result strict search.
      responses:
        "200":
          description: Search results with ELSER relevance scores
          content:
            application/json:
              schema:
                type: object
                properties:
                  candidates:
                    type: array
                    description: >
                      Candidate products with all InsuranceProduct fields plus
                      elser_score (raw RRF _score, not normalised)
                    items:
                      type: object
                      properties:
                        id:                     { type: string }
                        name:                   { type: string }
                        product_type:           { type: string }
                        plan_category:          { type: string }
                        description:            { type: string }
                        key_feature:            { type: string }
                        min_age:                { type: integer }
                        max_age:                { type: integer }
                        smoker_eligible:        { type: boolean }
                        min_income:             { type: integer }
                        max_sum_assured:        { type: integer }
                        medical_required_above: { type: integer }
                        premium_min_monthly:    { type: integer }
                        premium_max_monthly:    { type: integer }
                        is_active:              { type: boolean }
                        elser_score:            { type: number, description: "Raw RRF _score from Elasticsearch" }
                  total_hits:
                    type: integer
                    description: Total documents matching the query before size limit
                  fallback_triggered:
                    type: boolean
                    description: True when relax_age_filter was applied for this request
        "400":
          description: Invalid request — missing or wrong-type fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        "500":
          description: Elasticsearch error (cluster unreachable, query malformed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchError'

  # ---------------------------------------------------------------------------
  # Tool 2: compliance_check Cloud Function (TASK-042 adds 400/500)
  # ---------------------------------------------------------------------------
  /compliance_check:
    post:
      operationId: compliance_check
      summary: Check compliance eligibility of candidate products against a customer profile
      description: >
        Applies deterministic compliance rules to filter out insurance products that
        the customer is ineligible for. Returns passed and rejected products with reasons.
        Constitution §II: this function never calls an LLM — all rules are pure Python predicates.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [candidate_products, customer_profile]
              properties:
                candidate_products:
                  type: array
                  description: List of product objects returned by elastic_product_search
                  items: { type: object }
                customer_profile:
                  type: object
                  required: [age, income, smoker, health_status]
                  properties:
                    age:           { type: integer, description: "Customer age in years" }
                    income:        { type: integer, description: "Annual income in INR" }
                    smoker:        { type: boolean, description: "Whether the customer is a smoker" }
                    health_status: { type: string, enum: [healthy, pre_existing] }
                    sum_need:      { type: integer, description: "Desired sum assured in INR" }
      responses:
        "200":
          description: Compliance check result
          content:
            application/json:
              schema:
                type: object
                properties:
                  passed:
                    type: array
                    description: >
                      Full product objects that passed all compliance rules.
                      Passed to rank_products as passed_products.
                    items: { type: object }
                  rejected:
                    type: array
                    description: >
                      Products that failed at least one compliance rule.
                      Contains only product_id, product_name, and reasons — not the full product object.
                    items:
                      type: object
                      properties:
                        product_id:   { type: string }
                        product_name: { type: string }
                        reasons:      { type: array, items: { type: string } }
        "400":
          description: Invalid request — missing or wrong-type required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalError'

  # ---------------------------------------------------------------------------
  # Tool 3: rank_products Cloud Function (TASK-042 adds 400/500; TASK-043 adds audit)
  # ---------------------------------------------------------------------------
  /rank_products:
    post:
      operationId: rank_products
      summary: Score and rank compliance-passed products by customer suitability
      description: >
        Applies a weighted scoring formula (ELSER relevance × 0.4 + age_centrality × 0.3
        + income_fit × 0.3) to rank the top 3 most suitable insurance products for a
        customer profile. ELSER scores are normalised across the batch before use.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [passed_products, customer_profile]
              properties:
                passed_products:
                  type: array
                  description: Compliance-passed products from compliance_check (passed[])
                  items: { type: object }
                customer_profile:
                  type: object
                  required: [age, income]
                  properties:
                    age:      { type: integer }
                    income:   { type: integer }
                    sum_need: { type: integer }
      responses:
        "200":
          description: Ranked top-3 products with full audit trail
          content:
            application/json:
              schema:
                type: object
                properties:
                  top3:
                    type: array
                    maxItems: 3
                    items:
                      type: object
                      properties:
                        rank:
                          type: integer
                        product:
                          type: object
                          description: Full InsuranceProduct fields including flat premium fields
                        suitability_score:
                          type: number
                          minimum: 0
                          maximum: 1
                        score_breakdown:
                          type: object
                          properties:
                            elser_relevance: { type: number, minimum: 0, maximum: 1 }
                            age_centrality:  { type: number, minimum: 0, maximum: 1 }
                            income_fit:      { type: number, minimum: 0, maximum: 1 }
                  audit:
                    type: object
                    description: >
                      Full audit trail required by Constitution §IV. Present in every
                      response including empty top3 responses.
                    properties:
                      all_scored:
                        type: array
                        description: All evaluated products with their scores, sorted descending
                        items: { type: object }
                      formula_weights:
                        type: object
                        properties:
                          elser:  { type: number }
                          age:    { type: number }
                          income: { type: number }
                      customer_profile_hash:
                        type: string
                        description: SHA-256 of the anonymised customer profile (no PII stored)
        "400":
          description: Invalid request — missing or wrong-type required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalError'

# ---------------------------------------------------------------------------
# Shared error schemas (referenced by $ref above)
# ---------------------------------------------------------------------------
components:
  schemas:
    ValidationError:
      type: object
      properties:
        error:
          type: string
          enum: [validation_error]
        fields:
          type: array
          items: { type: string }
          description: List of field paths that failed validation
        detail:
          type: string
          description: Human-readable error detail (used when no field list is available)

    SearchError:
      type: object
      properties:
        error:
          type: string
          enum: [search_error]
        detail:
          type: string
          description: Elasticsearch error message

    InternalError:
      type: object
      properties:
        error:
          type: string
        detail:
          type: string
