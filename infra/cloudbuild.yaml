# Cloud Build CI/CD Pipeline ŌĆö InsureVoice
#
# Deployment order:
#   1. Build + push Elastic MCP Server Docker image
#   2. Deploy Elastic MCP Server to Cloud Run ŌåÆ captures URL to /workspace/mcp_url.txt
#   3. Copy shared/ + deploy compliance_check Cloud Function
#   4. Copy shared/ + deploy rank_products Cloud Function
#   5. Build + push InsureVoice ADK Agent Runner Docker image
#   6. Deploy ADK Agent Runner to Cloud Run
#       ŌåÆ ELASTIC_MCP_SERVER_URL injected from /workspace/mcp_url.txt
#       ŌåÆ COMPLIANCE_CHECK_URL / RANK_PRODUCTS_URL computed from $PROJECT_ID + region
#       ŌåÆ Gemini via Vertex AI ADC (no API key secret needed)
#   7. Print deployment summary (all service URLs)
#
# Required substitutions (pass via --substitutions or trigger config):
#   _ES_URL             ŌĆö Elastic Cloud Serverless endpoint (https://...)
#
# Required Secret Manager secrets:
#   ES_API_KEY          ŌĆö Elastic Cloud API key (read by elastic-mcp-server)
#
# Required IAM on Cloud Build SA:
#   roles/run.admin, roles/cloudfunctions.developer, roles/iam.serviceAccountUser,
#   roles/secretmanager.secretAccessor, roles/aiplatform.user

steps:

  # ---------------------------------------------------------------------------
  # Step 1: Build Elastic MCP Server Docker image
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: build-mcp-image
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/elastic-mcp-server
      - functions/elastic_mcp_server

  # ---------------------------------------------------------------------------
  # Step 1b: Build Elastic MCP Server NATIVE image (FastMCP at root ŌĆö no FastAPI)
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: build-mcp-native-image
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/elastic-mcp-server-native
      - functions/elastic_mcp_server_native

  # ---------------------------------------------------------------------------
  # Step 2a: Push Elastic MCP Server image to Container Registry
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: push-mcp-image
    waitFor: [build-mcp-image]
    args:
      - push
      - gcr.io/$PROJECT_ID/elastic-mcp-server

  # ---------------------------------------------------------------------------
  # Step 2a-native: Push Elastic MCP Server NATIVE image
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: push-mcp-native-image
    waitFor: [build-mcp-native-image]
    args:
      - push
      - gcr.io/$PROJECT_ID/elastic-mcp-server-native

  # ---------------------------------------------------------------------------
  # Step 2b-native: Deploy Elastic MCP Server NATIVE to Cloud Run.
  #   - MCP endpoint at /mcp (FastMCP mounted at Starlette root)
  #   - MCPToolset connects to https://<this-service>/mcp
  #   - Captures URL ŌåÆ /workspace/mcp_native_url.txt
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-mcp-native-server
    waitFor: [push-mcp-native-image]
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy elastic-mcp-server-native \
          --image=gcr.io/$PROJECT_ID/elastic-mcp-server-native \
          --platform=managed \
          --region=${_REGION} \
          --port=8080 \
          --min-instances=1 \
          --set-env-vars=ES_URL=${_ES_URL} \
          --set-secrets=ES_API_KEY=ES_API_KEY:latest

        gcloud run services add-iam-policy-binding elastic-mcp-server-native \
          --region=${_REGION} \
          --member=allUsers \
          --role=roles/run.invoker || true

        MCP_NATIVE_URL=$$(gcloud run services describe elastic-mcp-server-native \
          --region=${_REGION} --format='value(status.url)')
        echo "Elastic MCP Server NATIVE: $$MCP_NATIVE_URL"
        echo "  MCP endpoint: $$MCP_NATIVE_URL/mcp"
        echo -n "$$MCP_NATIVE_URL" > /workspace/mcp_native_url.txt

  # ---------------------------------------------------------------------------
  # Step 2b: Deploy Elastic MCP Server to Cloud Run.
  #   - ES_API_KEY read from Secret Manager (never in build logs)
  #   - Captures the Cloud Run URL ŌåÆ /workspace/mcp_url.txt
  #   - This URL is consumed by Step 6 (ADK agent runner env var)
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-mcp-server
    waitFor: [push-mcp-image]
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy elastic-mcp-server \
          --image=gcr.io/$PROJECT_ID/elastic-mcp-server \
          --platform=managed \
          --region=${_REGION} \
          --allow-unauthenticated \
          --port=8080 \
          --set-env-vars=ES_URL=${_ES_URL} \
          --set-secrets=ES_API_KEY=ES_API_KEY:latest

        MCP_URL=$$(gcloud run services describe elastic-mcp-server \
          --region=${_REGION} --format='value(status.url)')
        echo "Elastic MCP Server: $$MCP_URL"
        echo "  MCP endpoint:  $$MCP_URL/mcp"
        echo "  REST endpoint: $$MCP_URL/search_products"
        echo -n "$$MCP_URL" > /workspace/mcp_url.txt

  # ---------------------------------------------------------------------------
  # Step 3a: Copy shared/ module into compliance_check package before deploy
  # ---------------------------------------------------------------------------
  - name: 'ubuntu'
    id: copy-shared-compliance
    entrypoint: bash
    args:
      - -c
      - cp -r shared/ functions/compliance_check/shared/

  # ---------------------------------------------------------------------------
  # Step 3b: Deploy compliance_check Cloud Function
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-compliance-check
    waitFor: [copy-shared-compliance]
    entrypoint: bash
    args:
      - -c
      - |
        gcloud functions deploy compliance_check \
          --runtime=python311 \
          --trigger-http \
          --source=functions/compliance_check \
          --entry-point=compliance_check \
          --region=${_REGION} \
          --gen2
        # Grant public invoker access on the underlying Cloud Run service
        gcloud run services add-iam-policy-binding compliance-check \
          --region=${_REGION} \
          --member=allUsers \
          --role=roles/run.invoker || true

  # ---------------------------------------------------------------------------
  # Step 4a: Copy shared/ module into rank_products package before deploy
  # ---------------------------------------------------------------------------
  - name: 'ubuntu'
    id: copy-shared-rank
    entrypoint: bash
    args:
      - -c
      - cp -r shared/ functions/rank_products/shared/

  # ---------------------------------------------------------------------------
  # Step 4b: Deploy rank_products Cloud Function
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-rank-products
    waitFor: [copy-shared-rank]
    entrypoint: bash
    args:
      - -c
      - |
        gcloud functions deploy rank_products \
          --runtime=python311 \
          --trigger-http \
          --source=functions/rank_products \
          --entry-point=rank_products \
          --region=${_REGION} \
          --gen2
        # Grant public invoker access on the underlying Cloud Run service
        gcloud run services add-iam-policy-binding rank-products \
          --region=${_REGION} \
          --member=allUsers \
          --role=roles/run.invoker || true

  # ---------------------------------------------------------------------------
  # Step 4c-sim: Deploy simulate_premium Cloud Function (Story 6 ŌĆö deterministic)
  #   No shared/ dependency ŌĆö function is self-contained with inline catalog.
  #   Captures the HTTPS endpoint URL ŌåÆ /workspace/simulate_url.txt
  #   Consumed by Step 6 (agent runner SIMULATE_PREMIUM_URL env var).
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-simulate-premium
    waitFor: [deploy-rank-products]
    entrypoint: bash
    args:
      - -c
      - |
        gcloud functions deploy simulate_premium \
          --runtime=python311 \
          --trigger-http \
          --source=functions/simulate_premium \
          --entry-point=simulate_premium \
          --region=${_REGION} \
          --gen2
        # Grant public invoker access on the underlying Cloud Run service
        gcloud run services add-iam-policy-binding simulate-premium \
          --region=${_REGION} \
          --member=allUsers \
          --role=roles/run.invoker || true

        SIMULATE_URL=$$(gcloud functions describe simulate_premium \
          --gen2 --region=${_REGION} --format='value(serviceConfig.uri)')
        echo "simulate_premium: $$SIMULATE_URL"
        echo -n "$$SIMULATE_URL" > /workspace/simulate_url.txt

  # ---------------------------------------------------------------------------
  # Step 4c: Copy frontend/ folder into agent_builder/ so Docker build context
  # includes the static UI files. Mirrors the shared/ copy pattern (Step 3a/4a).
  # The agent service then serves index.html + app.js + simulation.js + style.css
  # at root, so the demo URL is single-origin (no CORS) and the FE+agent ship
  # together as one Cloud Run service.
  # ---------------------------------------------------------------------------
  - name: 'ubuntu'
    id: copy-frontend-agent
    entrypoint: bash
    args:
      - -c
      - cp -r frontend/ agent_builder/frontend/

  # ---------------------------------------------------------------------------
  # Step 5a: Build ADK Agent Runner Docker image
  # Build context: agent_builder/ directory
  # Image contains: main.py, agent_definition.py, root_agent_prompt.md,
  # requirements.txt, and frontend/ (copied in by Step 4c).
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: build-agent-image
    waitFor: [copy-frontend-agent]
    args:
      - build
      - -t
      - gcr.io/$PROJECT_ID/insure-voice-agent
      - agent_builder

  # ---------------------------------------------------------------------------
  # Step 5b: Push ADK Agent Runner image to Container Registry
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/cloud-builders/docker'
    id: push-agent-image
    waitFor: [build-agent-image]
    args:
      - push
      - gcr.io/$PROJECT_ID/insure-voice-agent

  # ---------------------------------------------------------------------------
  # Step 6: Deploy ADK Agent Runner to Cloud Run.
  #
  #   ELASTIC_MCP_SERVER_URL ŌĆö read from /workspace/mcp_url.txt (Step 2b output)
  #   COMPLIANCE_CHECK_URL   ŌĆö computed from $PROJECT_ID + region (deterministic CF URL)
  #   RANK_PRODUCTS_URL      ŌĆö same pattern
  #
  #   Gemini 2.0 Flash accessed via Vertex AI ADC ŌĆö no API key secret required.
  #   The agent URL is written to /workspace/agent_url.txt for the summary step.
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-agent-runner
    waitFor: [push-agent-image, deploy-mcp-server, deploy-mcp-native-server, deploy-compliance-check, deploy-rank-products, deploy-simulate-premium]
    entrypoint: bash
    args:
      - -c
      - |
        MCP_URL=$$(cat /workspace/mcp_url.txt)
        MCP_NATIVE_URL=$$(cat /workspace/mcp_native_url.txt)
        SIMULATE_URL=$$(cat /workspace/simulate_url.txt)
        COMPLIANCE_URL="https://${_REGION}-$PROJECT_ID.cloudfunctions.net/compliance_check"
        RANK_URL="https://${_REGION}-$PROJECT_ID.cloudfunctions.net/rank_products"

        # Day 8 (2026-06-05): --no-traffic is the safe default. New revisions
        # are deployed but DO NOT receive any traffic until manually promoted via
        # `gcloud run services update-traffic`. Live revision keeps serving 100%
        # until smoke-test PASS. This prevents broken revisions from going live
        # mid-build. Per Locked_Decisions D8 deploy strategy.
        gcloud run deploy insure-voice-agent \
          --image=gcr.io/$PROJECT_ID/insure-voice-agent \
          --platform=managed \
          --region=${_REGION} \
          --allow-unauthenticated \
          --port=8080 \
          --min-instances=1 \
          --max-instances=1 \
          --no-traffic \
          --set-env-vars="ELASTIC_MCP_SERVER_URL=$$MCP_URL,ELASTIC_MCP_SERVER_NATIVE_URL=$$MCP_NATIVE_URL,COMPLIANCE_CHECK_URL=$$COMPLIANCE_URL,RANK_PRODUCTS_URL=$$RANK_URL,SIMULATE_PREMIUM_URL=$$SIMULATE_URL,GOOGLE_GENAI_USE_VERTEXAI=TRUE,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=${_REGION}"

        # Capture the NEW revision URL (not the service URL ŌĆö that still
        # routes to the live revision). The new revision URL has the form:
        #   https://insure-voice-agent--<rev-name>-<hash>-uc.a.run.app
        AGENT_URL=$$(gcloud run services describe insure-voice-agent \
          --region=${_REGION} --format='value(status.url)')
        NEW_REV=$$(gcloud run services describe insure-voice-agent \
          --region=${_REGION} --format='value(status.latestCreatedRevisionName)')
        echo "InsureVoice Agent Runner (live URL, still serving previous rev):"
        echo "  $$AGENT_URL"
        echo "New revision deployed (NOT receiving traffic yet):"
        echo "  $$NEW_REV"
        echo "To promote: gcloud run services update-traffic insure-voice-agent --region=${_REGION} --to-revisions=$$NEW_REV=100"
        echo -n "$$AGENT_URL" > /workspace/agent_url.txt
        echo -n "$$NEW_REV" > /workspace/new_revision.txt

  # ---------------------------------------------------------------------------
  # Step 7: Print deployment summary ŌĆö all service URLs for reference
  # ---------------------------------------------------------------------------
  - name: 'ubuntu'
    id: deployment-summary
    waitFor: [deploy-agent-runner]
    entrypoint: bash
    args:
      - -c
      - |
        MCP_URL=$$(cat /workspace/mcp_url.txt)
        MCP_NATIVE_URL=$$(cat /workspace/mcp_native_url.txt)
        SIMULATE_URL=$$(cat /workspace/simulate_url.txt)
        AGENT_URL=$$(cat /workspace/agent_url.txt)
        echo "============================================================"
        echo "  InsureVoice Deployment Summary"
        echo "============================================================"
        echo "  elastic-mcp-server (Cloud Run ŌĆö REST + MCP-via-FastAPI)"
        echo "    REST endpoint: $$MCP_URL/search_products"
        echo "    MCP endpoint:  $$MCP_URL/mcp  (path: /mcp/mcp ŌĆö tools.yaml)"
        echo ""
        echo "  elastic-mcp-server-native (Cloud Run ŌĆö pure MCP at root)"
        echo "    MCP endpoint:  $$MCP_NATIVE_URL/mcp  ŌåÉ MCPToolset target"
        echo "    Health:        $$MCP_NATIVE_URL/health"
        echo ""
        echo "  compliance_check (Cloud Function)"
        echo "    https://${_REGION}-$PROJECT_ID.cloudfunctions.net/compliance_check"
        echo ""
        echo "  rank_products (Cloud Function)"
        echo "    https://${_REGION}-$PROJECT_ID.cloudfunctions.net/rank_products"
        echo ""
        echo "  simulate_premium (Cloud Function ŌĆö Story 6)"
        echo "    $$SIMULATE_URL"
        echo ""
        echo "  insure-voice-agent (Cloud Run ŌĆö ADK agent runner)"
        echo "    Health: $$AGENT_URL/health"
        echo "    Invoke: $$AGENT_URL/invoke"
        echo ""
        echo "  Next: wire $$AGENT_URL/invoke into Dialogflow CX webhook"
        echo "============================================================"

substitutions:
  _REGION: us-central1
  _ES_URL: ''    # Override: --substitutions=_ES_URL=https://...

options:
  logging: CLOUD_LOGGING_ONLY
